<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        html, body {
          margin: 0;
          padding: 0;
          width: 100%;
          height: 100%;
          background: transparent;
          overflow: hidden;
        }

        #page {
          position: fixed;
          left: 0; top: 0; right: 0; bottom: 0;
          width: 100%;
          height: 100%;
          background: #ffffff;
          padding: 12px;
          box-sizing: border-box;
          font-family: sans-serif;
          overflow: hidden;
        }

        .top-frame {
          position: absolute;
          left: 12px;
          top: 12px;
          right: 12px;
          width: auto;
          min-width: 0;
          max-width: none;
          height: 42px;
          box-sizing: border-box;
          z-index: 2;
        }

        .bottom-frame {
          position: absolute;
          left: 12px;
          top: 66px;
          right: 12px;
          bottom: 12px;
          box-sizing: border-box;
          overflow-y: auto;
          overflow-x: hidden;
        }

        .message-bar {
          display: flex;
          align-items: center;
          gap: 8px;
          width: 100%;
          box-sizing: border-box;
        }

        .message-input-cell {
          flex: 1 1 auto;
          min-width: 0;
          box-sizing: border-box;
        }

        .message-button-cell {
          flex: 0 0 auto;
        }

        .icon-button {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          width: 42px;
          height: 42px;
          padding: 0;
          box-sizing: border-box;
          cursor: pointer;
        }

        .icon-button img {
          width: 24px;
          height: 24px;
          display: block;
        }

        #editableTextField {
          display: block;
          width: 100%;
          height: 42px;
          font-size: 16px;
          padding: 8px 10px;
          box-sizing: border-box;
          line-height: 24px;
        }

        #editableTextField:disabled {
          color: #666666;
          background: #f3f3f3;
          pointer-events: none;
        }

        .clear-button {
          display: block;
          width: 80px;
          height: 42px;
          font-size: 16px;
          line-height: 24px;
          padding: 8px 14px;
          cursor: pointer;
          box-sizing: border-box;
          white-space: nowrap;
        }

        .section { margin: 1px 0 1px 0; }
        .folder-title { font-size: 16px; font-weight: 700; margin: 0 0 10px 0; }
        .folder-header {
          display: flex;
          align-items: center;
          gap: 12px;
          margin: 0 0 14px 0;
        }
        .button-arrow-back {
          width: 50px;
          height: 50px;
          cursor: pointer;
          flex: 0 0 50px;
        }
        .current-folder-name {
          font-size: 24px;
          font-weight: 700;
          color: #111;
          line-height: 1.2;
        }

        .row {
          font-size: 0;
        }

        .card {
          display: inline-block;
          vertical-align: top;
          font-size: 12px;
          border: 1px solid #000000;
          border-radius: 10px;
          padding: 8px;
          text-align: center;
          width: 130px;
          box-sizing: border-box;
          margin-right: 10px;
          margin-bottom: 10px;
          white-space: normal;
        }

        .cardfolder {
          display: inline-block;
          vertical-align: top;
          font-size: 12px;
          border: 3px solid #000000;
          border-radius: 10px;
          padding-right: 8px;
          padding-left: 8px;
          padding-top: 6px;
          padding-bottom: 6px;
          text-align: center;
          width: 130px;
          box-sizing: border-box;
          margin-right: 10px;
          margin-bottom: 10px;
          white-space: normal;
          background-color: #c4c2c0;
        }

        img.thumb {
          width: 100%;
          height: 112px;
          object-fit: cover;
          border-radius: 8px;
          cursor: pointer;
          display: block;
          margin: 0 auto;
        }

        .name {
          font-size: 12px;
          margin-top: 6px;
          height: 14px;
          line-height: 14px;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          color: #333;
        }
    </style>

    <script>
        var currentCardZoomScale = 1;
        var keyboardStatus = 'keyboard_off';
        var suppressEditableTextFieldSpeakOnce = false;
        var keyboardIcons = {
          keyboard_off: '{{KEYBOARD_OFF_ICON}}',
          keyboard_on: '{{KEYBOARD_ON_ICON}}'
        };

        function applyTopFrameWidth() {
          var page = document.getElementById('page');
          var topFrame = document.querySelector('.top-frame');
          var messageBar = document.querySelector('.message-bar');
          if (!page || !topFrame || !messageBar) return;

          var pageStyle = window.getComputedStyle ? window.getComputedStyle(page) : null;
          var paddingLeft = pageStyle ? parseFloat(pageStyle.paddingLeft) || 0 : 12;
          var paddingRight = pageStyle ? parseFloat(pageStyle.paddingRight) || 0 : 12;
          var availableWidth = page.clientWidth - paddingLeft - paddingRight;
          if (availableWidth < 0) availableWidth = 0;

          topFrame.style.width = availableWidth + 'px';
          messageBar.style.width = availableWidth + 'px';
        }

        function applyAndroidZoomScale(scale) {
          if (!scale || scale <= 0) scale = 1;
          if (scale < 0.5) scale = 0.5;
          if (scale > 5) scale = 5;
          currentCardZoomScale = scale;
          applyTopFrameWidth();
          var baseCardWidth = 130;
          var cardWidth = Math.round(baseCardWidth * scale);
          var thumbSize = Math.max(40, cardWidth - 18);
          var cards = document.querySelectorAll('.card');
          for (var i = 0; i < cards.length; i++) {
            var card = cards[i];
            card.style.width = cardWidth + 'px';
            var img = card.querySelector('.thumb');
            if (img) {
              img.style.height = thumbSize + 'px';
            }
          }

          var cardfolders = document.querySelectorAll('.cardfolder');
          for (var i = 0; i < cardfolders.length; i++) {
            var card = cardfolders[i];
            card.style.width = cardWidth + 'px';
            var img = card.querySelector('.thumb');
            if (img) {
              img.style.height = thumbSize + 'px';
            }
          }

          fitCardNamesToSingleLine();
        }

        function fitCardNamesToSingleLine() {
          var names = document.querySelectorAll('.card .name, .cardfolder .name');
          for (var i = 0; i < names.length; i++) {
            fitNameToSingleLine(names[i]);
          }
        }

        function fitNameToSingleLine(nameEl) {
          if (!nameEl) return;

          var maxFontSize = 12;
          var minFontSize = 7;
          nameEl.style.fontSize = maxFontSize + 'px';

          while (nameEl.scrollWidth > nameEl.clientWidth && maxFontSize > minFontSize) {
            maxFontSize -= 1;
            nameEl.style.fontSize = maxFontSize + 'px';
          }
        }

        function updateGridForZoom() {
          applyAndroidZoomScale(currentCardZoomScale || 1);
        }

        function onImgClicked(el) {
          setKeyboardStatus('keyboard_off');
          var path = el.getAttribute('data-path') || '';
          var word = el.getAttribute('data-word') || '';
          if (word) {
            var textField = document.getElementById('editableTextField');
            if (textField) {
              var existingText = textField.value || '';
              existingText = existingText.replace(/\s+$/, '');
              textField.value = existingText ? existingText + ' ' + word + ' ' : word + ' ';
              notifyEditableTextChanged();
            }
          }
          if (window.Android && Android.onImageClick) {
            Android.onImageClick(path);
          }
        }

        function onBackClicked() {
          if (window.Android && Android.onBackClick) {
            Android.onBackClick();
          }
        }

        function clearEditableTextField() {
          var textField = document.getElementById('editableTextField');
          if (textField) {
            textField.value = '';
            if (window.Android && Android.onTextFieldChanged) {
              Android.onTextFieldChanged('');
            }
          }
        }

        function notifyEditableTextChanged() {
          var textField = document.getElementById('editableTextField');
          if (!textField) return;
          if (window.Android && Android.onTextFieldChanged) {
            Android.onTextFieldChanged(textField.value || '');
          }
        }

        function speakEditableTextField() {
          var textField = document.getElementById('editableTextField');
          if (!textField) return;
          if (suppressEditableTextFieldSpeakOnce) {
            suppressEditableTextFieldSpeakOnce = false;
            return;
          }
          var isDisabled = !!textField.disabled;
          var end = textField.value ? textField.value.length : 0;
          if (!isDisabled && typeof textField.setSelectionRange === 'function') {
            textField.setSelectionRange(end, end);
          }
          var text = (textField.value || '').trim();
          if (!text) return;
          if (window.Android && Android.onTextFieldTapped) {
            Android.onTextFieldTapped(text);
          }
        }

        function onEditableTextFieldPressed(event) {
          if (event) {
            event.stopPropagation();
          }
          setKeyboardStatus('keyboard_off');
          speakEditableTextField();
        }

        function onEditableTextFieldContainerClick(event) {
          var textField = document.getElementById('editableTextField');
          if (!textField || !textField.disabled) return;
          if (event) {
            event.preventDefault();
            event.stopPropagation();
          }
          setKeyboardStatus('keyboard_off');
          speakEditableTextField();
        }

        function setEditableText(text) {
          var textField = document.getElementById('editableTextField');
          if (!textField) return;
          textField.value = text || '';
        }

        function focusEditableTextFieldAtEnd() {
          var textField = document.getElementById('editableTextField');
          if (!textField || textField.disabled) return;
          var currentValue = textField.value || '';
          if (currentValue && !/\s$/.test(currentValue)) {
            currentValue += ' ';
            textField.value = currentValue;
            notifyEditableTextChanged();
          }
          var end = currentValue.length;
          textField.focus();
          if (typeof textField.setSelectionRange === 'function') {
            textField.setSelectionRange(end, end);
          }
        }

        function hideVirtualKeyboard() {
          var textField = document.getElementById('editableTextField');
          if (!textField) return;
          textField.blur();
        }

        function updateKeyboardButtonIcon(status) {
          var button = document.getElementById('btnKeyboard');
          var icon = document.getElementById('btnKeyboardIcon');
          if (button) {
            button.setAttribute('aria-pressed', status === 'keyboard_on' ? 'true' : 'false');
          }
          if (!icon) return;
          icon.src = keyboardIcons[status] || keyboardIcons.keyboard_off;
        }

        function setKeyboardStatus(status, options) {
          var textField = document.getElementById('editableTextField');
          var safeStatus = status === 'keyboard_on' ? 'keyboard_on' : 'keyboard_off';
          var shouldFocus = options && options.focusField;
          if (!textField) {
            keyboardStatus = safeStatus;
            updateKeyboardButtonIcon(safeStatus);
            return;
          }

          keyboardStatus = safeStatus;
          updateKeyboardButtonIcon(safeStatus);

          if (safeStatus === 'keyboard_on') {
            textField.disabled = false;
            if (shouldFocus) {
              suppressEditableTextFieldSpeakOnce = true;
              focusEditableTextFieldAtEnd();
            }
            return;
          }

          hideVirtualKeyboard();
          textField.disabled = true;
        }

        function toggleKeyboard() {
          if (keyboardStatus === 'keyboard_off') {
            setKeyboardStatus('keyboard_on', { focusField: true });
            return;
          }
          setKeyboardStatus('keyboard_off');
        }

        function setBottomFrameContent(contentHtml) {
          var bottomFrame = document.querySelector('.bottom-frame');
          if (!bottomFrame) return;
          bottomFrame.innerHTML = contentHtml || '';
          bottomFrame.scrollTop = 0;
          applyTopFrameWidth();
          updateGridForZoom();
        }

        window.addEventListener('load', updateGridForZoom);
        window.addEventListener('resize', updateGridForZoom);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', updateGridForZoom);
          window.visualViewport.addEventListener('scroll', updateGridForZoom);
        }

        window.addEventListener('load', function() {
          setKeyboardStatus('keyboard_off');
          var textField = document.getElementById('editableTextField');
          if (!textField) return;
          textField.addEventListener('input', notifyEditableTextChanged);
          textField.addEventListener('change', notifyEditableTextChanged);
        });
    </script>
</head>
<body>
<div id="page">
    <div class="top-frame">
        <div class="message-bar">
            <div class="message-button-cell">
                <button type="button" id="btnKeyboard" class="icon-button" onclick="toggleKeyboard()" aria-label="Toggle keyboard">
                    <img id="btnKeyboardIcon" src="{{KEYBOARD_OFF_ICON}}" alt="Keyboard" />
                </button>
            </div>
            <div class="message-input-cell" onclick="onEditableTextFieldContainerClick(event)" ontouchend="onEditableTextFieldContainerClick(event)">
                <input type="text" id="editableTextField" onclick="onEditableTextFieldPressed(event)" onfocus="speakEditableTextField()" disabled />
            </div>
            <div class="message-button-cell">
                <button type="button" class="clear-button" onclick="clearEditableTextField()">Clear</button>
            </div>
        </div>
    </div>
    <div class="bottom-frame">
        {{CONTENT}}
    </div>
</div>
</body>
</html>
