<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        html, body { margin:0; padding:0; background:transparent; }

        #page {
          position: fixed;
          left: 0; top: 0; right: 0; bottom: 0;
          background: #ffffff;
          overflow-y: auto;
          overflow-x: hidden;
          padding: 12px;
          box-sizing: border-box;
          font-family: sans-serif;
        }

        .section { margin: 16px 0 22px 0; }
        .folder-title { font-size: 16px; font-weight: 700; margin: 0 0 10px 0; }

        .row {
          font-size: 0;
        }

        .card {
          display: inline-block;
          vertical-align: top;
          font-size: 12px;
          border: 1px solid #000000;
          border-radius: 10px;
          padding: 8px;
          text-align: center;
          width: 130px;
          box-sizing: border-box;
          margin-right: 10px;
          margin-bottom: 10px;
          white-space: normal;
        }

        img.thumb {
          width: 100%;
          height: 112px;
          object-fit: cover;
          border-radius: 8px;
          cursor: pointer;
          display: block;
          margin: 0 auto;
        }

        .name {
          font-size: 12px;
          margin-top: 6px;
          word-break: break-word;
          color: #333;
        }
    </style>

    <script>
        function applyAndroidZoomScale(scale) {
          if (!scale || scale <= 0) scale = 1;
          if (scale < 0.5) scale = 0.5;
          if (scale > 5) scale = 5;
          var baseCardWidth = 130;
          var cardWidth = Math.round(baseCardWidth * scale);
          var thumbSize = Math.max(40, cardWidth - 18);
          var cards = document.querySelectorAll('.card');
          for (var i = 0; i < cards.length; i++) {
            var card = cards[i];
            card.style.width = cardWidth + 'px';
            var img = card.querySelector('.thumb');
            if (img) {
              img.style.height = thumbSize + 'px';
            }
          }
        }

        function updateGridForZoom() {
          var vv = window.visualViewport;
          var scale = vv ? vv.scale : 1;
          applyAndroidZoomScale(scale);
          if (window.Android && Android.onViewportScaleChanged) {
            Android.onViewportScaleChanged(scale);
          }
        }

        function onImgClicked(el) {
          var path = el.getAttribute('data-path') || '';
          if (window.Android && Android.onImageClick) {
            Android.onImageClick(path);
          }
        }

        window.addEventListener('load', updateGridForZoom);
        window.addEventListener('resize', updateGridForZoom);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', updateGridForZoom);
          window.visualViewport.addEventListener('scroll', updateGridForZoom);
        }
    </script>
</head>
<body>
<div id="page">
    {{CONTENT}}
</div>
</body>
</html>
