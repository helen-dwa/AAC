<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        html, body { margin:0; padding:0; background:transparent; }

        #page {
          position: fixed;
          left: 0; top: 0; right: 0; bottom: 0;
          background: #ffffff;
          padding: 12px;
          box-sizing: border-box;
          font-family: sans-serif;
          display: flex;
          flex-direction: column;
          gap: 12px;
        }

        .top-frame {
          flex: 0 0 auto;
          position: relative;
          z-index: 2;
          background: #ffffff;
        }

        .bottom-frame {
          flex: 1 1 auto;
          min-height: 0;
          overflow-y: auto;
          overflow-x: hidden;
        }

        .message-bar {
          display: flex;
          align-items: stretch;
          gap: 8px;
        }

        #editableTextField {
          flex: 1 1 auto;
          min-width: 0;
          height: 42px;
          font-size: 16px;
          padding: 8px 10px;
          box-sizing: border-box;
          line-height: 24px;
        }

        .clear-button {
          flex: 0 0 auto;
          min-width: 72px;
          height: 42px;
          font-size: 16px;
          line-height: 24px;
          padding: 8px 14px;
          cursor: pointer;
          box-sizing: border-box;
          white-space: nowrap;
        }

        .section { margin: 16px 0 22px 0; }
        .folder-title { font-size: 16px; font-weight: 700; margin: 0 0 10px 0; }
        .folder-header {
          display: flex;
          align-items: center;
          gap: 12px;
          margin: 0 0 14px 0;
        }
        .button-arrow-back {
          width: 50px;
          height: 50px;
          cursor: pointer;
          flex: 0 0 50px;
        }
        .current-folder-name {
          font-size: 24px;
          font-weight: 700;
          color: #111;
          line-height: 1.2;
        }

        .row {
          font-size: 0;
        }

        .card {
          display: inline-block;
          vertical-align: top;
          font-size: 12px;
          border: 1px solid #000000;
          border-radius: 10px;
          padding: 8px;
          text-align: center;
          width: 130px;
          box-sizing: border-box;
          margin-right: 10px;
          margin-bottom: 10px;
          white-space: normal;
        }

        .cardfolder {
          display: inline-block;
          vertical-align: top;
          font-size: 12px;
          border: 3px solid #000000;
          border-radius: 10px;
          padding-right: 8px;
          padding-left: 8px;
          padding-top: 6px;
          padding-bottom: 6px;
          text-align: center;
          width: 130px;
          box-sizing: border-box;
          margin-right: 10px;
          margin-bottom: 10px;
          white-space: normal;
          background-color: #c4c2c0;
        }

        img.thumb {
          width: 100%;
          height: 112px;
          object-fit: cover;
          border-radius: 8px;
          cursor: pointer;
          display: block;
          margin: 0 auto;
        }

        .name {
          font-size: 12px;
          margin-top: 6px;
          word-break: break-word;
          color: #333;
        }
    </style>

    <script>
        var currentCardZoomScale = 1;

        function applyAndroidZoomScale(scale) {
          if (!scale || scale <= 0) scale = 1;
          if (scale < 0.5) scale = 0.5;
          if (scale > 5) scale = 5;
          currentCardZoomScale = scale;
          var baseCardWidth = 130;
          var cardWidth = Math.round(baseCardWidth * scale);
          var thumbSize = Math.max(40, cardWidth - 18);
          var cards = document.querySelectorAll('.card');
          for (var i = 0; i < cards.length; i++) {
            var card = cards[i];
            card.style.width = cardWidth + 'px';
            var img = card.querySelector('.thumb');
            if (img) {
              img.style.height = thumbSize + 'px';
            }
          }

          var cardfolders = document.querySelectorAll('.cardfolder');
          for (var i = 0; i < cards.length; i++) {
            var card = cardfolders[i];
            card.style.width = cardWidth + 'px';
            var img = card.querySelector('.thumb');
            if (img) {
              img.style.height = thumbSize + 'px';
            }
          }
        }

        function updateGridForZoom() {
          applyAndroidZoomScale(currentCardZoomScale || 1);
        }

        function onImgClicked(el) {
          var path = el.getAttribute('data-path') || '';
          var word = el.getAttribute('data-word') || '';
          if (word) {
            var textField = document.getElementById('editableTextField');
            if (textField) {
              var existingText = textField.value || '';
              existingText = existingText.replace(/\s+$/, '');
              textField.value = existingText ? existingText + ' ' + word + ' ' : word + ' ';
            }
          }
          if (window.Android && Android.onImageClick) {
            Android.onImageClick(path);
          }
        }

        function onBackClicked() {
          if (window.Android && Android.onBackClick) {
            Android.onBackClick();
          }
        }

        function clearEditableTextField() {
          var textField = document.getElementById('editableTextField');
          if (textField) {
            textField.value = '';
          }
        }

        function setBottomFrameContent(contentHtml) {
          var bottomFrame = document.querySelector('.bottom-frame');
          if (!bottomFrame) return;
          bottomFrame.innerHTML = contentHtml || '';
          bottomFrame.scrollTop = 0;
          updateGridForZoom();
        }

        window.addEventListener('load', updateGridForZoom);
        window.addEventListener('resize', updateGridForZoom);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', updateGridForZoom);
          window.visualViewport.addEventListener('scroll', updateGridForZoom);
        }
    </script>
</head>
<body>
<div id="page">
    <div class="top-frame">
        <div class="message-bar">
            <input type="text" id="editableTextField" />
            <button type="button" class="clear-button" onclick="clearEditableTextField()">Clear</button>
        </div>
    </div>
    <div class="bottom-frame">
        {{CONTENT}}
    </div>
</div>
</body>
</html>
